name: Update Leaderboard

on:
  push:
    branches: [main]
    paths:
      - 'submissions/**/predictions_test.json'

jobs:
  leaderboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Decode test labels
        run: |
          echo "${{ secrets.TEST_LABELS_B64 }}" | base64 -d > /tmp/test_labels.json

      - name: Score all submissions and build leaderboard
        run: |
          python - <<'EOF'
          import json, os, subprocess, sys
          from pathlib import Path

          results = []
          submissions_dir = Path("submissions")

          for team_dir in sorted(submissions_dir.iterdir()):
              pred_file = team_dir / "predictions_test.json"
              if not pred_file.exists() or team_dir.name == "README.md":
                  continue

              import tempfile, shutil
              tmp = Path(tempfile.mkdtemp())
              (tmp / "res").mkdir(); (tmp / "ref").mkdir(); out = tmp / "output"; out.mkdir()
              shutil.copy(pred_file, tmp / "res" / "predictions_test.json")
              shutil.copy("/tmp/test_labels.json", tmp / "ref" / "test_labels.json")

              subprocess.run(
                  [sys.executable, "scoring/evaluate.py", str(tmp), str(out)],
                  capture_output=True
              )
              scores_file = out / "scores.json"
              if scores_file.exists():
                  s = json.loads(scores_file.read_text())
                  results.append({
                      "team": team_dir.name,
                      "performance_score": s.get("performance_score", 0),
                      "mae_formation_energy": s.get("mae_formation_energy", 9999),
                      "mae_band_gap": s.get("mae_band_gap", 9999),
                      "n_missing": s.get("n_missing", 0),
                  })

          # Sort by performance_score descending
          results.sort(key=lambda x: x["performance_score"], reverse=True)

          # Write LEADERBOARD.md
          lines = [
              "# Leaderboard — EuMINe DataBridge Hackathon 2026",
              "",
              "_Automated scoring · Stage 1 (performance only) · Final score includes jury evaluation_",
              "",
              "| Rank | Team | Performance Score (/40) | MAE EF (eV/atom) | MAE BG (eV) | Missing |",
              "|------|------|------------------------|------------------|-------------|---------|",
          ]
          for i, r in enumerate(results, 1):
              lines.append(
                  f"| {i} | {r['team']} | {r['performance_score']} | "
                  f"{r['mae_formation_energy']} | {r['mae_band_gap']} | {r['n_missing']} |"
              )
          lines += ["", f"_Last updated: {__import__('datetime').date.today()}_"]
          Path("LEADERBOARD.md").write_text("\n".join(lines) + "\n")
          print(f"Leaderboard updated with {len(results)} teams.")
          EOF

      - name: Commit leaderboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LEADERBOARD.md
          git diff --cached --quiet || git commit -m "Update leaderboard [skip ci]"
          git push
